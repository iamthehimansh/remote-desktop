<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Dashboard — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#09090b;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:64px 64px}</style>
</head>
<body class="min-h-screen grid place-items-center text-zinc-50">
<form id="f" class="w-[380px] max-w-[calc(100%-2rem)] p-7 rounded-xl bg-zinc-900/80 backdrop-blur border border-zinc-700">
  <h1 class="text-center font-mono font-semibold text-xl flex items-center justify-center gap-2 mb-1">
    <svg class="w-5 h-5 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>
    Pi Dashboard
  </h1>
  <p class="text-center text-xs text-zinc-400 mb-5">pi.himansh.in</p>
  <p id="err" class="text-red-400 text-sm text-center mb-3 min-h-[20px]"></p>
  <input id="pass" type="password" placeholder="Password" required autofocus
    class="w-full px-3 py-2.5 rounded-md bg-zinc-800 border border-zinc-700 text-zinc-50 text-sm focus:outline-none focus:border-blue-500 mb-3">
  <button type="submit" id="btn" class="w-full py-2.5 rounded-md bg-blue-500 hover:bg-blue-600 text-white font-medium text-sm">Sign in</button>
</form>
<script>
const f=document.getElementById('f'),pass=document.getElementById('pass'),err=document.getElementById('err'),btn=document.getElementById('btn');
f.addEventListener('submit',async(e)=>{e.preventDefault();err.textContent='';btn.disabled=true;btn.textContent='Signing in…';
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass.value})});
    const d=await r.json();if(r.ok){const p=new URLSearchParams(location.search);location.href=p.get('next')||'/';}else{err.textContent=d.error||'Failed';}
  }catch(_){err.textContent='Network error';}finally{btn.disabled=false;btn.textContent='Sign in';}
});
</script></body></html>
